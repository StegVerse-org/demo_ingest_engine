name: Receive StegGhost Sandbox Receipt

on:
  repository_dispatch:
    types:
      - entity_sandbox_receipt
  workflow_dispatch:
    inputs:
      payload_json:
        description: Full bridge packet JSON for manual receipt testing
        required: true
        default: '{"schema":"stegverse.entity_sandbox_bridge.v1","sender_repository":"StegGhost/entity-sandbox-runner","receiver_repository":"StegVerse-org/demo_ingest_engine","requested_mode":"review","boundary":{"sender_may_install_into_receiver":false,"receiver_must_fail_closed_on_install_request":true},"receipt":{"missing":true,"path":"manual"}}'

permissions:
  contents: write

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Org ingestion engine
        uses: actions/checkout@v4

      - name: Normalize received packet
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          event = json.loads(event_path.read_text(encoding="utf-8"))

          if event_name == "repository_dispatch":
              packet = event.get("client_payload", {})
          else:
              packet = json.loads(os.environ["PAYLOAD_JSON"])

          Path("received_sandbox_packet.json").write_text(
              json.dumps(packet, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          print(json.dumps(packet, indent=2, sort_keys=True))
          PY
        env:
          PAYLOAD_JSON: ${{ inputs.payload_json }}

      - name: Validate bridge boundary
        run: |
          python - <<'PY'
          import json
          import time
          import hashlib
          from pathlib import Path

          packet = json.loads(Path("received_sandbox_packet.json").read_text(encoding="utf-8"))
          errors = []

          expected = {
              "schema": "stegverse.entity_sandbox_bridge.v1",
              "sender_repository": "StegGhost/entity-sandbox-runner",
              "receiver_repository": "StegVerse-org/demo_ingest_engine",
          }

          for key, value in expected.items():
              if packet.get(key) != value:
                  errors.append({"field": key, "expected": value, "actual": packet.get(key)})

          boundary = packet.get("boundary", {})
          if boundary.get("sender_may_install_into_receiver") is not False:
              errors.append({"field": "boundary.sender_may_install_into_receiver", "expected": False, "actual": boundary.get("sender_may_install_into_receiver")})

          if boundary.get("receiver_must_fail_closed_on_install_request") is not True:
              errors.append({"field": "boundary.receiver_must_fail_closed_on_install_request", "expected": True, "actual": boundary.get("receiver_must_fail_closed_on_install_request")})

          requested_mode = packet.get("requested_mode", "review")
          if requested_mode == "install":
              errors.append({"field": "requested_mode", "expected": "plan_or_review_only", "actual": requested_mode})

          packet_bytes = json.dumps(packet, sort_keys=True).encode("utf-8")
          receipt = {
              "schema": "stegverse.org_sandbox_receipt_admission.v1",
              "received_at_unix": time.time(),
              "receiver_repository": "StegVerse-org/demo_ingest_engine",
              "sender_repository": packet.get("sender_repository"),
              "requested_mode": requested_mode,
              "admitted": len(errors) == 0,
              "verdict": "RECEIVED_FOR_REVIEW" if len(errors) == 0 else "FAIL_CLOSED",
              "errors": errors,
              "packet_sha256": hashlib.sha256(packet_bytes).hexdigest(),
              "packet": packet,
          }

          out_dir = Path("reports/sandbox_receipts")
          out_dir.mkdir(parents=True, exist_ok=True)
          safe_ts = str(int(receipt["received_at_unix"] * 1000))
          out_path = out_dir / f"stegghost_{safe_ts}.receipt.json"
          out_path.write_text(json.dumps(receipt, indent=2, sort_keys=True), encoding="utf-8")
          Path("receipt_path.txt").write_text(str(out_path), encoding="utf-8")
          print(json.dumps(receipt, indent=2, sort_keys=True))

          if errors:
              raise SystemExit(1)
          PY

      - name: Commit admitted receipt record
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/sandbox_receipts
          git diff --cached --quiet || git commit -m "receipts: record StegGhost sandbox packet"
          git push

      - name: Upload received packet and receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stegghost-received-sandbox-receipt
          path: |
            received_sandbox_packet.json
            reports/sandbox_receipts/
            receipt_path.txt
