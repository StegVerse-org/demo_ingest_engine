name: Receive StegGhost Sandbox Receipt

on:
  repository_dispatch:
    types:
      - entity_sandbox_receipt
  workflow_dispatch:
    inputs:
      payload_json:
        description: Full bridge packet JSON for manual receipt testing
        required: true
        default: '{"schema":"stegverse.entity_sandbox_bridge.v1","sender_repository":"StegGhost/entity-sandbox-runner","receiver_repository":"StegVerse-org/demo_ingest_engine","event_type":"entity_sandbox_receipt","requested_mode":"review","boundary":{"sender_may_install_into_receiver":false,"receiver_must_fail_closed_on_install_request":true},"receipt":{"missing":true,"path":"manual"}}'

permissions:
  contents: write

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Org ingestion engine
        uses: actions/checkout@v4

      - name: Normalize received packet
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          event = json.loads(event_path.read_text(encoding="utf-8"))

          if event_name == "repository_dispatch":
              packet = event.get("client_payload", {})
          else:
              packet = json.loads(os.environ["PAYLOAD_JSON"])

          Path("received_sandbox_packet.json").write_text(
              json.dumps(packet, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          print(json.dumps(packet, indent=2, sort_keys=True))
          PY
        env:
          PAYLOAD_JSON: ${{ inputs.payload_json }}

      - name: Validate bridge boundary
        run: |
          python tools/validate_sandbox_packet.py \
            --packet received_sandbox_packet.json \
            --policy configs/tvc_bridge_policy.json \
            --out-dir reports/sandbox_receipts \
            --receipt-path-file receipt_path.txt

      - name: Index sandbox receipts
        run: |
          python tools/index_sandbox_receipts.py \
            --receipts-dir reports/sandbox_receipts

      - name: Verify sandbox receipt index
        run: |
          python tools/verify_sandbox_receipt_index.py \
            --receipts-dir reports/sandbox_receipts

      - name: Bind sandbox receipts to event ledger
        run: |
          python tools/bind_sandbox_receipts_ledger.py \
            --receipts-dir reports/sandbox_receipts \
            --ledger-dir event_ledger

      - name: Classify CGE handoff
        run: |
          python tools/classify_sandbox_receipt_handoff.py \
            --ledger-dir event_ledger \
            --handoff-dir cge_handoff

      - name: Commit admitted receipt record, index, verification, ledger, and handoff
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/sandbox_receipts event_ledger cge_handoff
          git diff --cached --quiet || git commit -m "receipts: record StegGhost sandbox packet"
          git push

      - name: Upload received packet, receipt, index, verification, ledger, and handoff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stegghost-received-sandbox-receipt
          path: |
            received_sandbox_packet.json
            reports/sandbox_receipts/
            event_ledger/
            cge_handoff/
            receipt_path.txt
