name: Run Ingestion Plan Check

on:
  workflow_dispatch:
    inputs:
      source_path:
        description: path inside incoming/ or URL to artifact
        required: true
        default: incoming/bundle.zip

permissions:
  contents: read

jobs:
  ingest-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ingestion engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve source
        run: |
          mkdir -p incoming
          SOURCE="${{ inputs.source_path }}"
          if echo "$SOURCE" | grep -q "^https://"; then
            echo "Downloading source for plan check only: $SOURCE"
            curl -L -o incoming/remote_bundle.zip "$SOURCE"
            echo "REMOTE_SOURCE=incoming/remote_bundle.zip" >> $GITHUB_ENV
          else
            echo "Using local source for plan check only: $SOURCE"
            echo "REMOTE_SOURCE=$SOURCE" >> $GITHUB_ENV
          fi

      - name: Run plan-only ingestion check
        run: |
          python -m ingest.cli plan "${{ env.REMOTE_SOURCE }}"

      - name: Upload plan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-plan-output
          path: |
            reports/
            updated_targets/
            deprecated/
