name: Run Ingestion

on:
  workflow_dispatch:
    inputs:
      mode:
        description: plan | install | orchestrate
        required: true
        type: choice
        options:
          - plan
          - install
          - orchestrate
      source_path:
        description: path inside incoming/ or URL to artifact
        required: true
        default: incoming/bundle.zip
      conflict_mode:
        description: replace or archive
        required: true
        type: choice
        options:
          - replace
          - archive

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ingestion engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download source if URL provided
        run: |
          SOURCE="${{ inputs.source_path }}"
          if echo "$SOURCE" | grep -q "^https://"; then
            echo "Downloading from URL: $SOURCE"
            curl -L -o incoming/remote_bundle.zip "$SOURCE"
            echo "REMOTE_SOURCE=incoming/remote_bundle.zip" >> $GITHUB_ENV
          else
            echo "Using local path: $SOURCE"
            echo "REMOTE_SOURCE=$SOURCE" >> $GITHUB_ENV
          fi

      - name: Run ingestion
        run: |
          MODE="${{ inputs.mode }}"
          SOURCE="${{ env.REMOTE_SOURCE }}"

          if [ "$MODE" = "plan" ]; then
            python -m ingest.cli plan "$SOURCE"
          fi

          if [ "$MODE" = "install" ]; then
            if [ "${{ inputs.conflict_mode }}" = "archive" ]; then
              python -m ingest.cli install "$SOURCE" --archive
            else
              python -m ingest.cli install "$SOURCE"
            fi
          fi

          if [ "$MODE" = "orchestrate" ]; then
            if [ "${{ inputs.conflict_mode }}" = "archive" ]; then
              python -m ingest.cli orchestrate "$SOURCE" --archive
            else
              python -m ingest.cli orchestrate "$SOURCE"
            fi
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: ingest-output
          path: |
            reports/
            updated_targets/
            deprecated/
