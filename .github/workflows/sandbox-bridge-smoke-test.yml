name: Sandbox Bridge Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - "configs/tvc_bridge_policy.json"
      - "tools/validate_sandbox_packet.py"
      - "tools/index_sandbox_receipts.py"
      - "tools/verify_sandbox_receipt_index.py"
      - "tools/bind_sandbox_receipts_ledger.py"
      - "tools/classify_sandbox_receipt_handoff.py"
      - "tools/verify_sandbox_receipt_handoff.py"
      - ".github/workflows/sandbox-bridge-smoke-test.yml"
      - ".github/workflows/receive-sandbox-receipt.yml"

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Org ingestion engine
        uses: actions/checkout@v4

      - name: Build accepted review packet
        run: |
          cat > accepted_review_packet.json <<'JSON'
          {
            "schema": "stegverse.entity_sandbox_bridge.v1",
            "sender_repository": "StegGhost/entity-sandbox-runner",
            "receiver_repository": "StegVerse-org/demo_ingest_engine",
            "event_type": "entity_sandbox_receipt",
            "requested_mode": "review",
            "boundary": {
              "sender_role": "sandbox_actor",
              "receiver_role": "org_ingestion_authority",
              "sender_may_install_into_receiver": false,
              "receiver_must_fail_closed_on_install_request": true
            },
            "receipt": {
              "missing": true,
              "path": "manual-smoke-test",
              "reason": "smoke_test_packet"
            }
          }
          JSON

      - name: Accepted review packet must pass under TVC policy
        run: |
          python tools/validate_sandbox_packet.py \
            --packet accepted_review_packet.json \
            --policy configs/tvc_bridge_policy.json \
            --out-dir smoke_reports/receipts \
            --receipt-path-file accepted_receipt_path.txt

      - name: Build refused install packet
        run: |
          cat > refused_install_packet.json <<'JSON'
          {
            "schema": "stegverse.entity_sandbox_bridge.v1",
            "sender_repository": "StegGhost/entity-sandbox-runner",
            "receiver_repository": "StegVerse-org/demo_ingest_engine",
            "event_type": "entity_sandbox_receipt",
            "requested_mode": "install",
            "boundary": {
              "sender_role": "sandbox_actor",
              "receiver_role": "org_ingestion_authority",
              "sender_may_install_into_receiver": false,
              "receiver_must_fail_closed_on_install_request": true
            },
            "receipt": {
              "missing": true,
              "path": "manual-smoke-test",
              "reason": "smoke_test_packet"
            }
          }
          JSON

      - name: Install packet must fail closed under TVC policy
        run: |
          if python tools/validate_sandbox_packet.py \
            --packet refused_install_packet.json \
            --policy configs/tvc_bridge_policy.json \
            --out-dir smoke_reports/receipts \
            --receipt-path-file refused_receipt_path.txt
          then
            echo "Install packet was admitted unexpectedly."
            exit 1
          fi

          echo "Install packet failed closed as expected."

      - name: Build sandbox receipt index
        run: |
          python tools/index_sandbox_receipts.py \
            --receipts-dir smoke_reports/receipts

      - name: Verify sandbox receipt index
        run: |
          python tools/verify_sandbox_receipt_index.py \
            --receipts-dir smoke_reports/receipts

      - name: Bind sandbox receipts to event ledger
        run: |
          python tools/bind_sandbox_receipts_ledger.py \
            --receipts-dir smoke_reports/receipts \
            --ledger-dir smoke_reports/event_ledger

      - name: Classify CGE handoff
        run: |
          python tools/classify_sandbox_receipt_handoff.py \
            --ledger-dir smoke_reports/event_ledger \
            --handoff-dir smoke_reports/cge_handoff

      - name: Verify CGE handoff
        run: |
          python tools/verify_sandbox_receipt_handoff.py \
            --ledger-dir smoke_reports/event_ledger \
            --handoff-dir smoke_reports/cge_handoff

      - name: Assert smoke-test counts, replay status, ledger binding, and CGE handoff
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          index_path = Path("smoke_reports/receipts/sandbox_receipt_index.json")
          latest_path = Path("smoke_reports/receipts/latest_sandbox_receipt.json")
          summary_path = Path("smoke_reports/receipts/sandbox_receipt_index.md")
          verify_path = Path("smoke_reports/receipts/sandbox_receipt_index_verification.json")
          verify_summary_path = Path("smoke_reports/receipts/sandbox_receipt_index_verification.md")
          ledger_batch_path = Path("smoke_reports/event_ledger/sandbox_receipt_batch_000001.json")
          ledger_latest_path = Path("smoke_reports/event_ledger/latest_sandbox_receipt_batch.json")
          ledger_verification_path = Path("smoke_reports/event_ledger/sandbox_receipt_ledger_verification.json")
          ledger_summary_path = Path("smoke_reports/event_ledger/sandbox_receipt_ledger_verification.md")
          handoff_path = Path("smoke_reports/cge_handoff/sandbox_receipt_handoff.json")
          handoff_summary_path = Path("smoke_reports/cge_handoff/sandbox_receipt_handoff.md")
          handoff_verification_path = Path("smoke_reports/cge_handoff/sandbox_receipt_handoff_verification.json")
          handoff_verification_summary_path = Path("smoke_reports/cge_handoff/sandbox_receipt_handoff_verification.md")

          for path in [
              index_path,
              latest_path,
              summary_path,
              verify_path,
              verify_summary_path,
              ledger_batch_path,
              ledger_latest_path,
              ledger_verification_path,
              ledger_summary_path,
              handoff_path,
              handoff_summary_path,
              handoff_verification_path,
              handoff_verification_summary_path,
          ]:
              assert path.exists(), f"{path} missing"

          index = json.loads(index_path.read_text(encoding="utf-8"))
          verification = json.loads(verify_path.read_text(encoding="utf-8"))
          ledger_batch = json.loads(ledger_batch_path.read_text(encoding="utf-8"))
          ledger_latest = json.loads(ledger_latest_path.read_text(encoding="utf-8"))
          ledger_verification = json.loads(ledger_verification_path.read_text(encoding="utf-8"))
          handoff = json.loads(handoff_path.read_text(encoding="utf-8"))
          handoff_verification = json.loads(handoff_verification_path.read_text(encoding="utf-8"))

          assert index["receipt_count"] == 2, index
          assert index["parseable_count"] == 2, index
          assert index["admitted_count"] == 1, index
          assert index["fail_closed_count"] == 1, index
          assert index["latest_receipt"] is not None, index
          assert verification["status"] == "PASS", verification
          assert verification["receipt_file_count"] == 2, verification
          assert verification["recomputed_admitted_count"] == 1, verification
          assert verification["recomputed_fail_closed_count"] == 1, verification
          assert ledger_batch["batch_number"] == 1, ledger_batch
          assert ledger_batch["verification_status"] == "PASS", ledger_batch
          assert ledger_batch["receipt_count"] == 2, ledger_batch
          assert ledger_batch["admitted_count"] == 1, ledger_batch
          assert ledger_batch["fail_closed_count"] == 1, ledger_batch
          assert ledger_latest["batch_sha256"] == ledger_batch["batch_sha256"], ledger_latest
          assert ledger_verification["status"] == "PASS", ledger_verification
          assert ledger_verification["batch_count"] == 1, ledger_verification
          assert handoff["verdict"] == "READY_FOR_REVIEW", handoff
          assert handoff["execution_authority"] is False, handoff
          assert handoff["install_authority"] is False, handoff
          assert handoff["handoff_scope"] == "classification_only", handoff
          assert handoff_verification["status"] == "PASS", handoff_verification
          assert handoff_verification["verdict"] == "READY_FOR_REVIEW", handoff_verification
          assert handoff_verification["execution_authority"] is False, handoff_verification
          assert handoff_verification["install_authority"] is False, handoff_verification
          assert handoff_verification["handoff_scope"] == "classification_only", handoff_verification

          print(json.dumps({"index": index, "verification": verification, "ledger": ledger_verification, "handoff": handoff, "handoff_verification": handoff_verification}, indent=2, sort_keys=True))
          PY

      - name: Upload smoke-test receipts, index, verification, ledger, and handoff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-bridge-smoke-test-receipts
          path: |
            accepted_review_packet.json
            refused_install_packet.json
            configs/tvc_bridge_policy.json
            smoke_reports/
            accepted_receipt_path.txt
            refused_receipt_path.txt
