name: Sandbox Bridge Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - "configs/tvc_bridge_policy.json"
      - "tools/validate_sandbox_packet.py"
      - "tools/index_sandbox_receipts.py"
      - "tools/verify_sandbox_receipt_index.py"
      - "tools/bind_sandbox_receipts_ledger.py"
      - "tools/classify_sandbox_receipt_handoff.py"
      - "tools/verify_sandbox_receipt_handoff.py"
      - "tools/build_sandbox_receipt_queue.py"
      - "tools/verify_sandbox_receipt_queue.py"
      - ".github/workflows/sandbox-bridge-smoke-test.yml"
      - ".github/workflows/receive-sandbox-receipt.yml"

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Org ingestion engine
        uses: actions/checkout@v4

      - name: Build accepted review packet
        run: |
          cat > accepted_review_packet.json <<'JSON'
          {
            "schema": "stegverse.entity_sandbox_bridge.v1",
            "sender_repository": "StegGhost/entity-sandbox-runner",
            "receiver_repository": "StegVerse-org/demo_ingest_engine",
            "event_type": "entity_sandbox_receipt",
            "requested_mode": "review",
            "boundary": {
              "sender_role": "sandbox_actor",
              "receiver_role": "org_ingestion_authority",
              "sender_may_install_into_receiver": false,
              "receiver_must_fail_closed_on_install_request": true
            },
            "receipt": {
              "missing": true,
              "path": "manual-smoke-test",
              "reason": "smoke_test_packet"
            }
          }
          JSON

      - name: Accepted review packet must pass under TVC policy
        run: |
          python tools/validate_sandbox_packet.py \
            --packet accepted_review_packet.json \
            --policy configs/tvc_bridge_policy.json \
            --out-dir smoke_reports/receipts \
            --receipt-path-file accepted_receipt_path.txt

      - name: Build refused install packet
        run: |
          cat > refused_install_packet.json <<'JSON'
          {
            "schema": "stegverse.entity_sandbox_bridge.v1",
            "sender_repository": "StegGhost/entity-sandbox-runner",
            "receiver_repository": "StegVerse-org/demo_ingest_engine",
            "event_type": "entity_sandbox_receipt",
            "requested_mode": "install",
            "boundary": {
              "sender_role": "sandbox_actor",
              "receiver_role": "org_ingestion_authority",
              "sender_may_install_into_receiver": false,
              "receiver_must_fail_closed_on_install_request": true
            },
            "receipt": {
              "missing": true,
              "path": "manual-smoke-test",
              "reason": "smoke_test_packet"
            }
          }
          JSON

      - name: Install packet must fail closed under TVC policy
        run: |
          if python tools/validate_sandbox_packet.py \
            --packet refused_install_packet.json \
            --policy configs/tvc_bridge_policy.json \
            --out-dir smoke_reports/receipts \
            --receipt-path-file refused_receipt_path.txt
          then
            echo "Install packet was admitted unexpectedly."
            exit 1
          fi

      - name: Build and verify receipt evidence stack
        run: |
          python tools/index_sandbox_receipts.py --receipts-dir smoke_reports/receipts
          python tools/verify_sandbox_receipt_index.py --receipts-dir smoke_reports/receipts
          python tools/bind_sandbox_receipts_ledger.py --receipts-dir smoke_reports/receipts --ledger-dir smoke_reports/event_ledger
          python tools/classify_sandbox_receipt_handoff.py --ledger-dir smoke_reports/event_ledger --handoff-dir smoke_reports/cge_handoff
          python tools/verify_sandbox_receipt_handoff.py --ledger-dir smoke_reports/event_ledger --handoff-dir smoke_reports/cge_handoff
          python tools/build_sandbox_receipt_queue.py --handoff-dir smoke_reports/cge_handoff --queue-dir smoke_reports/cge_intake
          python tools/verify_sandbox_receipt_queue.py --queue-dir smoke_reports/cge_intake

      - name: Assert queue verification passed
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path("smoke_reports/cge_intake/sandbox_receipt_queue_verification.json").read_text(encoding="utf-8"))
          assert result["status"] == "PASS", result
          assert result["item_count"] == 1, result
          assert result["queued_for_review_count"] == 1, result
          assert result["install_authority"] is False, result
          assert result["execution_authority"] is False, result
          print(json.dumps(result, indent=2, sort_keys=True))
          PY

      - name: Upload smoke-test receipts and queue
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-bridge-smoke-test-receipts
          path: |
            accepted_review_packet.json
            refused_install_packet.json
            configs/tvc_bridge_policy.json
            smoke_reports/
            accepted_receipt_path.txt
            refused_receipt_path.txt
