name: Experimental Governance Review Utility

on:
  workflow_dispatch:
    inputs:
      reviewer:
        description: Reviewer name or handle
        required: true
        default: Rigel Randolph
      verdict:
        description: Future governance-review verdict; not part of active sandbox-testing path
        required: true
        type: choice
        options:
          - APPROVE_FOR_PLANNING
          - HOLD_FOR_MORE_EVIDENCE
          - REJECT
        default: HOLD_FOR_MORE_EVIDENCE
      rationale:
        description: Reason for the future governance-review verdict
        required: true
        default: Experimental governance-review receipt. Not part of the active StegGhost sandbox-testing path.
      review_scope:
        description: Scope of future governance review
        required: true
        default: future_governance_review_utility

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Org ingestion engine
        uses: actions/checkout@v4

      - name: Declare experimental posture
        run: |
          echo "This workflow is an experimental future governance-review utility."
          echo "It is not part of the active StegVerse-org SDK/LLM adapter → StegGhost ingestion sandbox-testing path."
          echo "The active path uses declared sandbox test manifests and returns bounded test results."

      - name: Rebuild CGE queue when possible
        run: |
          if [ ! -d "reports/sandbox_receipts" ]; then
            echo "::error::No committed reports/sandbox_receipts directory was found. This experimental review utility requires prior receipt evidence."
            exit 1
          fi

          python tools/index_sandbox_receipts.py --receipts-dir reports/sandbox_receipts
          python tools/verify_sandbox_receipt_index.py --receipts-dir reports/sandbox_receipts
          python tools/bind_sandbox_receipts_ledger.py --receipts-dir reports/sandbox_receipts --ledger-dir event_ledger
          python tools/classify_sandbox_receipt_handoff.py --ledger-dir event_ledger --handoff-dir cge_handoff
          python tools/verify_sandbox_receipt_handoff.py --ledger-dir event_ledger --handoff-dir cge_handoff
          python tools/build_sandbox_receipt_queue.py --handoff-dir cge_handoff --queue-dir cge_intake
          python tools/verify_sandbox_receipt_queue.py --queue-dir cge_intake

      - name: Create experimental review receipt
        run: |
          python tools/create_sandbox_review_receipt.py \
            --queue-dir cge_intake \
            --review-dir review_receipts \
            --reviewer "${REVIEWER}" \
            --verdict "${VERDICT}" \
            --rationale "${RATIONALE}" \
            --review-scope "${REVIEW_SCOPE}"
        env:
          REVIEWER: ${{ inputs.reviewer }}
          VERDICT: ${{ inputs.verdict }}
          RATIONALE: ${{ inputs.rationale }}
          REVIEW_SCOPE: ${{ inputs.review_scope }}

      - name: Verify experimental review receipt
        run: |
          python tools/verify_sandbox_review_receipt.py \
            --review-dir review_receipts

      - name: Commit experimental review receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/sandbox_receipts event_ledger cge_handoff cge_intake review_receipts
          git diff --cached --quiet || git commit -m "review: record experimental governance review receipt"
          git push

      - name: Upload experimental review receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experimental-governance-review-receipt
          path: |
            reports/sandbox_receipts/
            event_ledger/
            cge_handoff/
            cge_intake/
            review_receipts/
